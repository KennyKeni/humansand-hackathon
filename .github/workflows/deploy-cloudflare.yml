name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate application
        run: pnpm check

  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_cloudflare: ${{ steps.check.outputs.deploy_cloudflare }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Check deploy prerequisites
        id: check
        run: |
          deploy_cloudflare=true
          missing=()

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            missing+=("CLOUDFLARE_ACCOUNT_ID")
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            missing+=("CLOUDFLARE_API_TOKEN")
          fi
          if [ -z "$NEXT_PUBLIC_CONVEX_URL" ]; then
            missing+=("NEXT_PUBLIC_CONVEX_URL")
          fi
          if [ -z "$OPENROUTER_API_KEY" ]; then
            missing+=("OPENROUTER_API_KEY")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            deploy_cloudflare=false
            joined="$(IFS=, ; echo "${missing[*]}")"
            echo "::notice title=Cloudflare deploy skipped::Set missing deploy inputs: ${joined}"
          fi

          echo "deploy_cloudflare=${deploy_cloudflare}" >> "$GITHUB_OUTPUT"

  deploy-cloudflare:
    needs:
      - validate
      - preflight
    if: ${{ needs.preflight.outputs.deploy_cloudflare == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare bundle
        run: pnpm build:cloudflare

      - name: Deploy to Cloudflare Workers
        run: |
          printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY" > "$RUNNER_TEMP/cloudflare-secrets.env"
          pnpm exec opennextjs-cloudflare deploy --secrets-file "$RUNNER_TEMP/cloudflare-secrets.env"
