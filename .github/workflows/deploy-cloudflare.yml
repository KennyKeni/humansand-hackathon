name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CONVEX_DEPLOYMENT: ${{ vars.CONVEX_DEPLOYMENT }}
      NEXT_PUBLIC_CONVEX_SITE_URL: ${{ vars.NEXT_PUBLIC_CONVEX_SITE_URL }}
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Check Cloudflare token
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "::warning title=Missing CLOUDFLARE_API_TOKEN::Set CLOUDFLARE_API_TOKEN in repository secrets to enable automatic Cloudflare deployments."

      - name: Check out repository
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm ci

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm run deploy
